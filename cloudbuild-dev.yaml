steps:
  # Step 1: Compile the Go Application
  - name: 'gcr.io/cloud-builders/go'
    id: 'Compile application'
    env: ['GOPATH=/gopath', 'CGO_ENABLED=0']
    args: ['build', '-o', 'main', 'main.go']

  # Step 2: Build the Docker image for the Go application
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Docker image'
    args: ['build', '-t', 'europe-west1-docker.pkg.dev/qwiklabs-gcp-01-329130b7707b/my-repository/hello-cloudbuild-dev:v1.0', '.']

  # Step 3: Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Docker image'
    args: ['push', 'europe-west1-docker.pkg.dev/qwiklabs-gcp-01-329130b7707b/my-repository/hello-cloudbuild-dev:v1.0']

  # Step 4: Apply the development deployment YAML file to the dev namespace
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'Deploy'
    args: ['-n', 'dev', 'apply', '-f', 'dev/']
    env:
    - 'CLOUDSDK_COMPUTE_ZONE=europe-west1-c'
    - 'CLOUDSDK_CONTAINER_CLUSTER=hello-cluster'

  # Step 5: Force a rollout restart to ensure the new image is pulled
  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'Refresh Deployment'
    args: ['-n', 'dev', 'rollout', 'restart', 'deployment/development-deployment']
    env:
    - 'CLOUDSDK_COMPUTE_ZONE=europe-west1-c'
    - 'CLOUDSDK_CONTAINER_CLUSTER=hello-cluster'
options:
  logging: CLOUD_LOGGING_ONLY
